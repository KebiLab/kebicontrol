name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Copy artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/kebicontrol.exe" -Destination "dist/KebiControl.exe"
          Compress-Archive -Path "dist/KebiControl.exe" -DestinationPath "dist/KebiControl-windows-x64.zip"
          Get-FileHash "dist/KebiControl.exe" | Format-List

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kebicontrol-windows-x64
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KebiControl.exe
            dist/KebiControl-windows-x64.zip
          body: |
            KebiControl — voice control for Windows. Made by KebiLab.
            See README.md for usage.

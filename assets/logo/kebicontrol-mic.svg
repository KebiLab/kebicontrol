<?xml version="1.0" encoding="UTF-8"?>
<!-- KebiControl logo. Recreated from user-provided @logo.jpg. Made by KebiLab -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B1B6B"/>
      <stop offset="55%" stop-color="#2E3BCC"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Stand base (horizontal bar at the bottom) -->
  <rect x="60" y="220" width="136" height="14" rx="7" fill="url(#g)"/>

  <!-- Vertical stem -->
  <rect x="120" y="180" width="16" height="40" fill="url(#g)"/>

  <!-- U-shaped arc (horseshoe) around microphone capsule -->
  <path d="M 60 116
           A 68 68 0 0 1 196 116"
        stroke="url(#g)" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Microphone capsule (vertical pill) -->
  <rect x="100" y="40" width="56" height="116" rx="28" fill="url(#g)"/>

  <!-- Diagonal slash across capsule (mute mark style from user logo) -->
  <line x1="92" y1="64" x2="164" y2="184"
        stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
</svg>

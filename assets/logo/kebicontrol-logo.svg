<?xml version="1.0" encoding="UTF-8"?>
<!-- KebiControl logo — stylized K with voice dot. Made by KebiLab -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B9BFF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Vertical bar of K -->
  <rect x="20" y="20" width="22" height="88" rx="4" fill="url(#g)"/>
  <!-- Upper diagonal -->
  <polygon points="42,68 70,32 90,32 60,68" fill="url(#g)"/>
  <!-- Lower diagonal -->
  <polygon points="42,68 70,104 90,104 60,68" fill="url(#g)"/>
  <!-- Voice dot -->
  <circle cx="106" cy="32" r="9" fill="url(#g)"/>
</svg>
